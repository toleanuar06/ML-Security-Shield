<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>Сайт бұғатталды!</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #2b2b2b; color: white; padding-top: 100px; }
        .container { background: #1a1a1a; padding: 40px; border-radius: 12px; box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); display: inline-block; border: 2px solid #d9534f; max-width: 600px; }
        h1 { color: #d9534f; font-size: 32px; }
        p { font-size: 18px; color: #cccccc; }
        .score { font-weight: bold; color: #ff4c4c; font-size: 28px; }
        .url-box { background: #333; padding: 10px; border-radius: 6px; color: #ffeb3b; word-break: break-all; margin-top: 15px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛑 КІРУГЕ ҚАТАҢ ТЫЙЫМ САЛЫНАДЫ!</h1>
        <p>Бұл сайттың құрылымын біздің <b>Машиналық Оқыту моделі</b> сараптап, оны деректерді ұрлайтын фишинг немесе зиянды ресурс деп тапты.</p>
        <p>Қауіптілік деңгейі: <span class="score" id="score">...</span>%</p>
        <div class="url-box" id="url">...</div>
    </div>

    <script src="block.js"></script>
</body>
</html>
